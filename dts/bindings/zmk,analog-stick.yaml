description: |
  Multi-mode analog stick driver for ZMK. Reads analog position sensors
  (TMR, hall-effect, etc.) via Zephyr ADC io-channels and emits input
  events. Compatible with any Zephyr ADC driver (MCP3208, nRF52840
  SAADC, etc.).

compatible: "zmk,analog-stick"

properties:
  io-channels:
    type: phandle-array
    required: true
    description: |
      ADC channel references. Index 0 = X axis (required).
      Index 1 = Y axis (optional, omit for single-axis trigger/paddle).
      Example: io-channels = <&mcp3208_0 0>, <&mcp3208_0 1>;

  x-min:
    type: int
    required: true
    description: Raw ADC value at minimum X deflection (calibration).

  x-center:
    type: int
    required: true
    description: Raw ADC value at X center/rest position (calibration).

  x-max:
    type: int
    required: true
    description: Raw ADC value at maximum X deflection (calibration).

  y-min:
    type: int
    default: 0
    description: Raw ADC value at minimum Y deflection (only used with dual-axis).

  y-center:
    type: int
    default: 0
    description: Raw ADC value at Y center/rest position (only used with dual-axis).

  y-max:
    type: int
    default: 0
    description: Raw ADC value at maximum Y deflection (only used with dual-axis).

  deadzone:
    type: int
    default: 50
    description: |
      Per-axis linear deadzone in raw ADC units. Values within this
      distance of center are treated as zero. Applied independently
      to each axis in rescale_axis().

  invert-x:
    type: boolean
    description: Invert X axis output (negate after rescaling).

  invert-y:
    type: boolean
    description: Invert Y axis output (negate after rescaling).

  wait-period-idle:
    type: int
    default: 100
    description: Poll interval in ms when stick is at center (idle).

  wait-period-active:
    type: int
    default: 1
    description: Poll interval in ms when stick is deflected (active).

  enable-gpios:
    type: phandle-array
    description: |
      GPIO for sensor power control. Sticks sharing the same GPIO are
      grouped by the scan coordinator for a single settling wait per
      group, reducing total scan time.

  pulse-read:
    type: boolean
    description: |
      Toggle sensor power per read cycle. Requires enable-gpios.
      Reduces idle power by duty-cycling sensor power.

  read-turn-on-time:
    type: int
    default: 100
    description: |
      Sensor settling time in microseconds after asserting enable GPIO.
      Default 100µs is appropriate for TMR sensors. Hall-effect users
      should set 1000-5000µs per their sensor datasheet (e.g.
      read-turn-on-time = <5000>).

  inter-channel-settling-time:
    type: int
    default: 40
    description: |
      Inter-channel settling time in microseconds between X and Y ADC reads.
      nRF52840 SAADC requires 40µs minimum; MCP3208 needs only ~5µs.
      Tune per hardware to minimize scan time without corrupting readings.

  filter-coefficients:
    type: array
    description: |
      IIR biquad filter coefficients as 6 raw IEEE-754 uint32 hex
      representations (b0, b1, b2, a0, a1, a2). a0 must be 1.0
      (normalized, hex 0x3F800000). Omit to disable filtering.
      Example (2nd-order Butterworth LPF, 25Hz cutoff at 125Hz/8ms poll):
        filter-coefficients = <0x3D8A3D71 0x3E0A3D71 0x3D8A3D71
                                0x3F800000 0xBF927DBD 0x3ED32C9C>;
      Coefficients must be recalculated for poll rates other than 8ms.
